# apimed.com.br — nginx (fonte versionada; instalar em /etc/nginx/sites-available)
#
#   /            landing institucional APIMED (estática, ./landing)
#   /sepse/      SPA do Protocolo Sepse (frontend/dist, build com base=/sepse/)
#   /sepse/api/  backend do Protocolo Sepse (Node em 127.0.0.1:4000, rota /api)
#
# Instalação (uma vez, como root — o deploy automático só faz `reload`):
#   cp deploy/nginx/apimed.conf /etc/nginx/sites-available/apimed.conf
#   ln -sf /etc/nginx/sites-available/apimed.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# TLS: gerenciado fora deste arquivo (ex.: certbot --nginx injeta os blocos 443).

server {
    listen 80;
    listen [::]:80;
    server_name apimed.com.br www.apimed.com.br;

    # ---- Landing institucional na raiz -----------------------------------
    location = / {
        root /opt/protocolo-sepse/landing;
        try_files /index.html =404;
    }

    # ---- Protocolo Sepse: API -------------------------------------------
    # O backend continua expondo /api internamente; o prefixo público é
    # /sepse/api (o proxy_pass com barra final faz a reescrita do caminho).
    location /sepse/api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Protocolo Sepse: SPA -------------------------------------------
    location = /sepse { return 301 /sepse/; }

    location /sepse/ {
        alias /opt/protocolo-sepse/frontend/dist/;
        # Fallback de SPA: qualquer caminho sob /sepse/ que não seja um asset
        # cai no index.html do app.
        try_files $uri $uri/ /sepse/index.html;
    }

    # Assets do build têm hash no nome — cache agressivo é seguro.
    location /sepse/assets/ {
        alias /opt/protocolo-sepse/frontend/dist/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # A aplicação deixa de existir fora de /sepse: quem tinha o caminho antigo
    # na raiz é levado para a nova casa (e a raiz exata segue com a landing).
    # 308 preserva o método HTTP (um POST antigo em /api/... não vira GET).
    location /api/ { return 308 /sepse$request_uri; }
}
